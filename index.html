<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>合成仕途</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#8b0000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Microsoft YaHei','PingFang SC',sans-serif;overflow-x:hidden}
.game-container{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0}
.game-wrapper{position:relative}
canvas{display:block;border-radius:12px;box-shadow:0 0 40px rgba(139,0,0,.5)}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui-overlay>*{pointer-events:auto}

/* Top bar */
/* Left side buttons & score */
.left-btns{position:absolute;top:10px;left:6px;z-index:15;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
.left-btns>*{pointer-events:auto}
.left-btn{width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border:1px solid rgba(255,215,0,.2);color:#ffd700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;line-height:1}
.left-btn:hover{background:rgba(0,0,0,.7);transform:scale(1.1)}
.left-btn.active{background:rgba(255,215,0,.2);border-color:#ffd700}
.left-btn.muted{color:#666;border-color:rgba(255,255,255,.1)}
.left-btn.gold{background:rgba(255,215,0,.2);border-color:#ffd700;color:#ffd700;animation:settlePulse 1.5s ease-in-out infinite}
@keyframes settlePulse{0%,100%{box-shadow:0 0 4px rgba(255,215,0,.3)}50%{box-shadow:0 0 14px rgba(255,215,0,.6)}}
.settle-btn{display:none;position:absolute;top:10px;right:6px;width:44px;height:44px;border-radius:6px;background:rgba(255,215,0,.15);border:2px solid #ffd700;color:#ffd700;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;align-items:center;justify-content:center;animation:settlePulse 1.5s ease-in-out infinite;z-index:60}
.settle-btn.show{display:flex}
.score-box span{font-size:13px;font-weight:700;color:#ffd700}

/* Level info */
.level-info{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border-radius:8px;padding:4px 12px;color:#ddd;font-size:11px;z-index:10;white-space:nowrap}

/* Game over overlay */
.game-over{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(80,0,0,.85);backdrop-filter:blur(4px);border-radius:12px;z-index:50;flex-direction:column;justify-content:center;align-items:center;color:#fff;padding:20px}
.game-over.show{display:flex}
.game-over h2{font-size:28px;margin-bottom:4px;color:#ffd700}
.game-over p{font-size:13px;margin-bottom:2px;color:#ddd}
.game-over .final-score{font-size:36px;color:#ffd700;font-weight:700;margin:4px 0}
.game-over .merged-count{color:#ffaaaa;font-size:13px;margin-bottom:6px}
.name-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,215,0,.4);border-radius:8px;padding:8px 12px;color:#fff;font-size:15px;width:180px;text-align:center;outline:none;margin-bottom:6px;font-family:inherit}
.name-input::placeholder{color:rgba(255,255,255,.3)}
.btn-group{display:flex;gap:8px;margin-top:4px}
.btn-restart,.btn-rank{background:linear-gradient(135deg,#ff6b6b,#cc0000);border:2px solid #ffd700;color:#ffd700;font-size:15px;padding:8px 20px;border-radius:25px;cursor:pointer;transition:transform .2s;font-weight:600}
.btn-rank{background:linear-gradient(135deg,#cc0000,#8b0000);font-size:13px;padding:8px 16px}
.btn-restart:hover,.btn-rank:hover{transform:scale(1.05)}

/* Hierarchy legend */
.hierarchy{position:absolute;top:50%;right:-90px;transform:translateY(-50%);display:none;flex-direction:column;gap:2px;z-index:10}
.hierarchy .tier{display:flex;align-items:center;gap:4px;font-size:11px;color:#ddd;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.3)}
.hierarchy .tier .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
@media(min-width:700px){.hierarchy{display:flex}}

/* QR code */
.qrcode-box{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,0,0,.95);backdrop-filter:blur(8px);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:20px;z-index:60;flex-direction:column;align-items:center;min-width:200px}
.qrcode-box.show{display:flex}
.qrcode-box img{width:180px;height:180px;border-radius:8px;background:#fff;padding:8px}
.qrcode-close{position:absolute;top:8px;right:12px;color:#888;font-size:18px;cursor:pointer;line-height:1}
.qrcode-close:hover{color:#fff}
.qrcode-url{color:#ffd700;font-size:11px;margin-top:10px;word-break:break-all;text-align:center;max-width:200px}
.qrcode-hint{color:#aaa;font-size:10px;margin-top:4px}

/* Tool bar - outside game area */
.tool-bar{display:flex;gap:6px;padding:8px 14px;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border-radius:12px}
.tool-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,215,0,.2);color:#ffd700;font-size:11px;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:70px}
.tool-btn:hover{background:rgba(255,255,255,.15)}
.tool-btn.active{background:rgba(255,215,0,.2);border-color:#ffd700}
.tool-btn .cost{color:#ff6b6b;font-size:9px}
.tool-btn .uses{color:#aaa;font-size:9px}

/* Tool status */
.tool-status{position:absolute;top:48px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);backdrop-filter:blur(4px);border-radius:6px;padding:4px 12px;color:#ffd700;font-size:11px;z-index:15;display:none;white-space:nowrap;border:1px solid rgba(255,215,0,.2)}

/* Tool confirmation modal */
.tool-confirm{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:65;flex-direction:column;align-items:center}
.tool-confirm.show{display:flex}
.tc-box{background:rgba(20,0,0,.96);backdrop-filter:blur(12px);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:20px;min-width:260px;display:flex;flex-direction:column;align-items:center;gap:8px}
.tc-icon{font-size:40px}
.tc-title{color:#ffd700;font-size:18px;font-weight:700}
.tc-cost{color:#fff;font-size:13px}
.tc-cost span{color:#ff6b6b;font-weight:700;font-size:15px}
.tc-warning{background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.25);border-radius:8px;padding:8px 12px;color:#ffaaaa;font-size:11px;line-height:1.6;text-align:center;width:100%}
.tc-btns{display:flex;gap:10px;margin-top:4px}
.tc-btn{border:none;border-radius:20px;padding:8px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s;font-family:inherit}
.tc-btn:hover{transform:scale(1.05)}
.tc-cancel{background:rgba(255,255,255,.1);color:#aaa}
.tc-confirm{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#5a0000}
.tc-confirm:disabled{opacity:.4;cursor:default;transform:none}

/* Tier picker inside tool confirm */
.tc-tier-grid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0;width:100%}
.tc-tier-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 8px;color:#ddd;font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit}
.tc-tier-btn:hover{background:rgba(255,215,0,.15);border-color:rgba(255,215,0,.3)}
.tc-tier-btn.selected{background:rgba(255,215,0,.2);border-color:#ffd700;color:#ffd700}
/* Ball-style tier picker for tool 2 */
.tc-tier-ball{width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tc-tier-ball:hover{transform:scale(1.12);border-color:rgba(255,215,0,.5)}
.tc-tier-ball.selected{border-color:#ffd700;box-shadow:0 0 14px rgba(255,215,0,.5),inset 0 0 10px rgba(255,215,0,.15)}
.tcb-emoji{font-size:20px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.tcb-name{color:#fff;font-size:8px;line-height:1;margin-top:2px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.tc-tier-hint{color:#888;font-size:11px}

/* Ranking modal */
.rank-modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,0,0,.96);backdrop-filter:blur(8px);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:16px;z-index:80;flex-direction:column;min-width:300px;max-height:80%;overflow:hidden}
.rank-modal.show{display:flex}
.rank-tabs{display:flex;gap:4px;margin-bottom:10px}
.rank-tab{flex:1;text-align:center;padding:6px;border-radius:6px;cursor:pointer;font-size:12px;color:#aaa;background:rgba(255,255,255,.05);transition:all .2s;border:none;font-family:inherit}
.rank-tab.active{background:rgba(255,215,0,.15);color:#ffd700}
.rank-list{overflow-y:auto;max-height:320px;flex:1}
.rank-item{display:flex;align-items:center;padding:5px 8px;border-radius:4px;margin-bottom:2px;font-size:12px;color:#ddd;gap:6px}
.rank-item:nth-child(even){background:rgba(255,255,255,.03)}
.rank-item .rank-num{width:24px;color:#888;text-align:center;font-weight:700}
.rank-item .rank-num.gold{color:#ffd700}
.rank-item .rank-num.silver{color:#c0c0c0}
.rank-item .rank-num.bronze{color:#cd7f32}
.rank-item .rank-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-item .rank-score{color:#ffd700;font-weight:700;font-size:13px}
.rank-item .rank-tier{color:#aaa;font-size:10px}
.rank-item .rank-uses{color:#888;font-size:10px}
.rank-item.current{background:rgba(255,215,0,.15);border:1px solid #ffd700;box-shadow:0 0 8px rgba(255,215,0,.2)}
.rank-item .rank-current-tag{color:#ffd700;font-size:9px;background:rgba(255,215,0,.15);border-radius:3px;padding:1px 4px;margin-left:4px;white-space:nowrap}
.rank-empty{color:#666;text-align:center;padding:30px 0;font-size:13px}
.rank-close{position:absolute;top:10px;right:14px;color:#888;font-size:18px;cursor:pointer;line-height:1}
.rank-close:hover{color:#fff}
.rank-title{color:#ffd700;font-size:13px;font-weight:700;margin-bottom:4px;text-align:center}
.rank-sub{color:#888;font-size:10px;text-align:center;margin-bottom:8px}

/* Congratulations modal */
.congrats-modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:75;flex-direction:column;align-items:center}
.congrats-modal.show{display:flex}
.congrats-box{background:linear-gradient(135deg,rgba(139,0,0,.98),rgba(80,0,0,.98));backdrop-filter:blur(12px);border:2px solid #ffd700;border-radius:20px;padding:24px 28px;min-width:280px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 0 60px rgba(255,215,0,.2)}
.congrats-icon{font-size:56px;animation:congratsBounce 1s ease-in-out infinite}
@keyframes congratsBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.congrats-title{color:#ffd700;font-size:20px;font-weight:700;text-align:center;text-shadow:0 0 20px rgba(255,215,0,.4)}
.congrats-sub{color:#ffaaaa;font-size:13px;text-align:center}
.congrats-score{color:#fff;font-size:14px;margin-top:4px}
.congrats-score span{color:#ffd700;font-weight:700;font-size:18px}
.congrats-name-area{margin:2px 0;width:100%;display:flex;justify-content:center}.congrats-rank-display{color:#ffd700;font-size:16px;font-weight:700;text-align:center;padding:8px 12px;background:rgba(255,215,0,.1);border-radius:8px;width:100%;margin:4px 0}.game-over-rank{color:#ffd700;font-size:14px;font-weight:700;text-align:center;margin-bottom:6px}.congrats-btns{display:flex;flex-direction:column;gap:8px;margin-top:8px;width:100%}
.congrats-btn{border:none;border-radius:20px;padding:10px 24px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s;font-family:inherit;width:100%}
.congrats-btn:hover{transform:scale(1.05)}
.congrats-btn-rank{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#5a0000}
.congrats-btn-continue{background:rgba(255,255,255,.12);color:#ffd700;border:1px solid rgba(255,215,0,.3)}

/* Modal backdrop — blocks canvas interaction when modals are open */
.modal-backdrop{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:transparent;z-index:45}
.modal-backdrop.show{display:block}

/* Settings modal */
.settings-modal{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:85;flex-direction:column;align-items:center}
.settings-modal.show{display:flex}
.settings-box{background:rgba(20,0,0,.96);backdrop-filter:blur(8px);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:20px;min-width:240px;display:flex;flex-direction:column;align-items:center;gap:10px}
.settings-close{position:absolute;top:8px;right:12px;color:#888;font-size:18px;cursor:pointer;line-height:1}
.settings-close:hover{color:#fff}
.settings-title{color:#ffd700;font-size:16px;font-weight:700;margin-bottom:4px}
.settings-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:8px;color:#ddd;font-size:13px}
.settings-toggle{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#aaa;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.settings-toggle:hover{background:rgba(255,215,0,.15);border-color:rgba(255,215,0,.3)}
.settings-toggle.active{background:rgba(255,215,0,.15);border-color:#ffd700;color:#ffd700}
.settings-pwd-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,215,0,.3);border-radius:6px;padding:6px 10px;color:#fff;font-size:13px;width:160px;text-align:center;outline:none;font-family:inherit}
.settings-pwd-input::placeholder{color:rgba(255,255,255,.3)}
.settings-pwd-error{color:#ff6b6b;font-size:11px;display:none}
</style>
</head>
<body>

<div class="game-container">
<div class="game-wrapper" style="position:relative">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay">
    <div class="left-btns">
      <div class="score-box">🎯<br><span id="scoreDisplay">0</span></div>
      <button class="left-btn" onclick="showRanking()" title="排行榜">🏆</button>
      <button class="left-btn" onclick="if(confirm('确定重新开始？当前进度将丢失'))restartGame()" title="重新开始">🔄</button>
      <button class="left-btn" id="settingsBtn" onclick="openSettings()" title="设置">⚙️</button>
    </div>
    <button class="settle-btn" id="settleBtn" onclick="settleGame()" title="结算">结算</button>
    <div class="tool-status" id="toolStatus"></div>
    <div class="level-info" id="levelInfo">点击/触摸位置投放</div>
    <div class="game-over" id="gameOverOverlay">
      <h2>🏛️ 仕途终结</h2>
      <div class="final-score" id="finalScore">0</div>
      <p>最终官场积分</p>
      <div class="merged-count" id="mergedCount"></div>
      <div class="game-over-rank" id="gameOverRank" style="display:none"></div>
      <input class="name-input" id="nameInput" placeholder="输入你的大名" maxlength="8">
      <div class="btn-group">
        <button class="btn-restart" onclick="submitAndShowRanking()">📝 提交排名</button>
        <button class="btn-restart" onclick="goBackToGame()" style="background:linear-gradient(135deg,#666,#333);font-size:13px">🏠 返回主界面</button>
	        <button class="btn-restart" onclick="restartWithoutSubmit()" style="background:linear-gradient(135deg,#666,#333);font-size:13px">🔄 重新开始</button>
      </div>
    </div>
  </div>

  <!-- Congratulations modal for highest tier -->
  <div class="congrats-modal" id="congratsModal">
    <div class="congrats-box">
      <div class="congrats-icon">🏆</div>
      <div class="congrats-title">恭喜成功合成<br>国务院总理！</div>
      <div class="congrats-sub">你已登顶公务员仕途之巅！</div>
      <div class="congrats-score">当前积分：<span id="congratsScore">0</span></div>
      <div class="congrats-name-area">
        <input class="name-input" id="congratsNameInput" placeholder="输入你的大名" maxlength="8" value="匿名">
      </div>
      <div class="congrats-rank-display" id="congratsRankDisplay" style="display:none"></div>
      <div class="congrats-btns">
        <button class="congrats-btn congrats-btn-rank" id="congratsSubmitBtn" onclick="submitCongratsRank()">📝 提交排名</button>
        <button class="congrats-btn congrats-btn-continue" onclick="closeCongrats()">继续游戏</button>
      </div>
    </div>
  </div>

  <!-- Tool confirmation modal -->
  <div class="tool-confirm" id="toolConfirm">
    <div class="tc-box">
      <div class="tc-icon" id="tcIcon">🗑️</div>
      <div class="tc-title" id="tcTitle">区域清除</div>
      <div class="tc-cost">消耗：<span id="tcCost">30000</span> 积分</div>
      <div class="tc-warning">⚠️ 注意：使用工具会在速通排行中<br>增加惩罚分（工具1/3加30000，工具2加10000），不利于速通排名！</div>
      <div id="tcExtra"></div>
      <div class="tc-btns">
        <button class="tc-btn tc-cancel" onclick="cancelToolConfirm()">取消</button>
        <button class="tc-btn tc-confirm" id="tcConfirmBtn" onclick="confirmTool()">确定使用</button>
      </div>
    </div>
  </div>

  <div class="hierarchy" id="hierarchyLegend"></div>
  <div class="qrcode-box" id="qrcodeBox">
    <div class="qrcode-close" id="qrcodeClose">✕</div>
    <img src="" id="qrcodeImg" alt="QR Code">
    <p class="qrcode-url" id="qrcodeUrl"></p>
    <p class="qrcode-hint">微信扫码或复制链接打开</p>
  </div>

  <!-- Ranking modal -->
  <div class="rank-modal" id="rankModal">
    <div class="rank-close" id="rankClose">✕</div>
    <div class="rank-title">🏆 仕途排行榜</div>
    <div class="rank-sub" id="rankSub">分数从高到低排列</div>
    <div class="rank-tabs">
      <button class="rank-tab active" data-rank="total">总分排行</button>
      <button class="rank-tab" data-rank="fastest">速通排行</button>
    </div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <!-- Modal backdrop -->
  <div class="modal-backdrop" id="modalBackdrop"></div>

  <!-- Settings modal -->
  <div class="settings-modal" id="settingsModal">
    <div class="settings-box">
      <div class="settings-close" id="settingsClose">✕</div>
      <div class="settings-title">⚙️ 设置</div>
      <div class="settings-item">
        <span>🎵 背景音乐</span>
        <button class="settings-toggle" id="settingsMusicBtn">已关闭</button>
      </div>
      <div class="settings-item">
        <span>🔧 开发者模式</span>
        <button class="settings-toggle" id="settingsDevBtn">已关闭</button>
      </div>
      <div id="devPasswordArea" style="display:none;flex-direction:column;align-items:center;gap:6px;margin-top:4px;width:100%">
        <input class="settings-pwd-input" id="devPasswordInput" type="password" placeholder="输入开发者密码">
        <div style="display:flex;gap:6px">
          <button class="settings-toggle" id="devPasswordSubmit" style="color:#ffd700;border-color:#ffd700">确认</button>
          <button class="settings-toggle" id="devPasswordCancel">取消</button>
        </div>
        <div class="settings-pwd-error" id="devPasswordError">密码错误！</div>
      </div>
      <div class="settings-item" style="margin-top:6px;border-top:1px solid rgba(255,215,0,.15);padding-top:8px">
        <span style="color:#ff6b6b;font-size:12px">🗑️ 删除所有排名数据</span>
        <button class="settings-toggle" onclick="clearRankings()" style="color:#ff6b6b;border-color:#ff6b6b;font-size:11px">删除</button>
      </div>
    </div>
  </div>
</div>

<div class="tool-bar" id="toolBar">
  <button class="tool-btn" data-tool="1">🗑️ 清除区域<br><span class="cost">-30000分</span></button>
  <button class="tool-btn" data-tool="2">🎯 指定放置<br><span class="cost">-10000分</span></button>
  <button class="tool-btn" data-tool="3">🔀 随机重置<br><span class="cost">-30000分</span></button>
</div>
</div>

<audio id="bgmAudio" loop preload="auto">
  <source src="bgm.aac" type="audio/aac">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
// ======================== 合成层级定义（公务员→国务院） ========================
const TIERS = [
  { name:'科员',     emoji:'🧑‍💼', color:'#ffd93d', size:20, radius:17 },

// ======================== Ball creation ========================
function createBall(tierIndex, x, y, isStatic) {
  const tier = TIERS[tierIndex];
  const radius = tier.radius;
  const ball = Bodies.circle(x, y, radius, {
    restitution: 0.35,
    friction: 0.4,
    frictionAir: 0.004,
    density: 0.0015 + tierIndex * 0.00015,
    label: 'ball',
    tier: tierIndex,
  });
  if (isStatic) Body.setStatic(ball, true);
  Composite.add(world, ball);
  balls.push({ body: ball, tier: tierIndex });
  return ball;
}

// ======================== Drop mechanics ========================
function startDrop(clientX, clientY) {
  if (gameOver || congratsShown) return;

  // Tool 1: area select mode
  if (activeTool === 1) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    toolSelectX = (clientX - rect.left) * scaleX;
    toolSelectY = (clientY - rect.top) * scaleY;
    toolSelectActive = true;
    return;
  }

  // Tool 2: pick placement position
  if (activeTool === 2) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    tool2DropX = Math.max(WALL_L + TIERS[pendingTier].radius + 4, Math.min(WALL_R - TIERS[pendingTier].radius - 4, (clientX - rect.left) * scaleX));
    tool2DropY = Math.max(40, Math.min(300, (clientY - rect.top) * scaleY));
    tool2DropActive = true;
    return;
  }

  if (!canDrop || activeTool) return;

  // Developer mode: place 10 random balls instead of normal drop
  if (devMode) {
    doDevDrop();
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = Math.max(WALL_L + TIERS[nextTier].radius + 4, Math.min(WALL_R - TIERS[nextTier].radius - 4, (clientX - rect.left) * scaleX));
  if (currentDrop) { Composite.remove(world, currentDrop); currentDrop = null; }
  const ball = createBall(nextTier, x, 40, true);
  currentDrop = ball;
  dropX = x;
}

function doDevDrop() {
  const maxTier = Math.min(6, 4 + Math.floor(score / 200));
  for (let i = 0; i < 10; i++) {
    const tier = Math.floor(Math.random() * maxTier);
    const x = WALL_L + TIERS[tier].radius + 4 + Math.random() * (WALL_R - WALL_L - TIERS[tier].radius * 2 - 8);
    const y = 40 + Math.random() * 200;
    createBall(tier, x, y, false);
  }
  chainMergeCount = 0;
  lastDropTime = Date.now();
  canDrop = false;
  setTimeout(() => {
    if (!gameOver) {
      canDrop = true;
      const maxTier2 = Math.min(4 + Math.floor(score / 200), 8);
      nextTier = Math.floor(Math.random() * maxTier2);
      if (nextTier >= TIERS.length) nextTier = TIERS.length - 4;
      updateUI();
    }
  }, 300);
}

function moveDrop(clientX, clientY) {
  if (gameOver) return;

  // Tool 1: update area select preview
  if (activeTool === 1 && toolSelectActive) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    toolSelectX = (clientX - rect.left) * scaleX;
    toolSelectY = (clientY - rect.top) * scaleY;
    return;
  }

  // Tool 2: update placement position preview
  if (activeTool === 2 && tool2DropActive) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    tool2DropX = Math.max(WALL_L + TIERS[pendingTier].radius + 4, Math.min(WALL_R - TIERS[pendingTier].radius - 4, (clientX - rect.left) * scaleX));
    tool2DropY = Math.max(40, Math.min(400, (clientY - rect.top) * scaleY));
    return;
  }

  if (!currentDrop || activeTool) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = Math.max(WALL_L + TIERS[nextTier].radius + 4, Math.min(WALL_R - TIERS[nextTier].radius - 4, (clientX - rect.left) * scaleX));
  dropX = x;
  Body.setPosition(currentDrop, { x, y: 40 });
}

function releaseDrop() {
  if (gameOver) return;

  // Tool 1: execute area delete at selected position
  if (activeTool === 1 && toolSelectActive) {
    doAreaDeleteAt(toolSelectX, toolSelectY);
    toolSelectActive = false;
    return;
  }

  // Tool 2: place ball at selected position (one ball only)
  if (activeTool === 2 && tool2DropActive && pendingTier >= 0) {
    doPlaceBallAt(pendingTier, tool2DropX, tool2DropY);
    tool2DropActive = false;
    return;
  }

  if (!currentDrop || activeTool || congratsShown) return;
  Body.setStatic(currentDrop, false);
  canDrop = false;
  lastDropTime = Date.now();
  currentDrop = null;
  chainMergeCount = 0;
  setTimeout(() => {
    if (!gameOver) {
      const maxTier = Math.min(4 + Math.floor(score / 200), 8);
      nextTier = Math.floor(Math.random() * maxTier);
      if (nextTier >= TIERS.length) nextTier = TIERS.length - 4;
      updateUI();
      canDrop = true;
    }
  }, 500);
}

// ======================== Merge logic ========================
let mergeQueue = [];
let mergeEventsBound = false;

function bindMergeEvents() {
  if (mergeEventsBound) return;
  mergeEventsBound = true;
  Events.on(engine, 'collisionStart', (event) => {
    for (const pair of event.pairs) {
      const bodyA = pair.bodyA, bodyB = pair.bodyB;
      if (bodyA.label !== 'ball' || bodyB.label !== 'ball') continue;
      const ballA = balls.find(b => b.body === bodyA);
      const ballB = balls.find(b => b.body === bodyB);
      if (!ballA || !ballB || ballA.tier < 0 || ballB.tier < 0) continue;
      if (ballA.tier !== ballB.tier || ballA.tier >= TIERS.length - 1) continue;
      const idA = ballA.body.id, idB = ballB.body.id;
      const key = idA < idB ? `${idA}-${idB}` : `${idB}-${idA}`;
      if (mergeQueue.includes(key)) continue;
      mergeQueue.push(key);
      const newTier = ballA.tier + 1;
      const midX = (bodyA.position.x + bodyB.position.x) / 2;
      const midY = (bodyA.position.y + bodyB.position.y) / 2;
      const points = (newTier + 1) * (10 + newTier * 8);
      score += points;
      if (newTier > highestTierEver) {
        highestTierEver = newTier;
        scoreAtHighestTier = score;
      }
      Composite.remove(world, bodyA);
      Composite.remove(world, bodyB);
      ballA.tier = -1; ballB.tier = -1;
      const newBody = createBall(newTier, midX, midY, false);
      createMergeEffect(midX, midY, TIERS[newTier].color);
      createScorePopup(midX, midY, points);
      triggerShake(3 + newTier * 0.5);
      if (newTier >= TIERS.length - 2) flashAlpha = 0.3;
      playMergeSound(newTier);
      chainMergeCount++;
      if (chainMergeCount >= 5 && flyTexts.length === 0) {
        flyTexts.push({ text: '我太想进步了', x: -200, y: 80 + Math.random() * 60, speed: 3 + Math.random(), opacity: 1 });
      }
      if (newTier >= TIERS.length - 1) showCongrats();
      updateUI();
      balls = balls.filter(b => b.tier >= 0);
      setTimeout(() => { mergeQueue = []; }, 100);
    }
  });
}

// ======================== Score Popup ========================
function createScorePopup(x, y, points) {
  scorePopups.push({ x, y, text: `+${points}`, life: 1, vy: -0.8 });
}

function updateScorePopups() {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy;
    p.life -= 0.018;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (const p of scorePopups) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, p.life * 1.5);
    ctx.font = 'bold 22px "Microsoft YaHei",Arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = '#ffd700';
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }
}

// ======================== Merge effect ========================
let particles = [];

// ======================== Flying text ========================
function updateFlyTexts() {
  for (let i = flyTexts.length - 1; i >= 0; i--) {
    const ft = flyTexts[i];
    ft.x += ft.speed;
    ft.opacity = Math.min(1, ft.opacity + 0.02);
    if (ft.x > W + 200) flyTexts.splice(i, 1);
  }
}

function drawFlyTexts() {
  for (const ft of flyTexts) {
    ctx.save();
    ctx.globalAlpha = ft.opacity;
    ctx.font = 'bold 36px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 30;
    ctx.strokeStyle = 'rgba(139,0,0,0.8)';
    ctx.lineWidth = 6;
    ctx.lineJoin = 'round';
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillStyle = '#ffd700';
    ctx.shadowBlur = 25;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

function createMergeEffect(x, y, color) {
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 2;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1, life: 1, color: i % 3 === 0 ? '#ffd700' : color, size: 4 + Math.random() * 6 });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ======================== Tools System ========================
function useTool(toolId) {
  if (gameOver) return;
  if (activeTool) { return; }
  // Per-tool cost: tool 2 costs 10000, tools 1/3 cost 30000
  const toolCost = toolId === 2 ? 10000 : 30000;
  if (!devMode && score < toolCost) {
    showToolStatus(`积分不足${toolCost}！`, 1500);
    return;
  }
  // Show confirmation modal
  pendingTool = toolId;
  pendingTier = -1;
  const icons = ['', '🗑️', '🎯', '🔀'];
  const names = ['', '区域清除', '指定放置', '随机重置'];
  document.getElementById('tcIcon').textContent = icons[toolId];
  document.getElementById('tcTitle').textContent = names[toolId];
  document.getElementById('tcCost').textContent = toolId === 2 ? '10000 积分（速通+10000）' : String(toolCost);
  const extra = document.getElementById('tcExtra');
  extra.innerHTML = '';

  if (toolId === 1) {
    extra.innerHTML = '<div style="color:#aaa;font-size:11px;text-align:center;margin-bottom:4px">长按选择区域清除（最高级别不受影响）</div>';
  } else if (toolId === 2) {
    // Show tier picker in the confirmation modal
    let html = '<div style="color:#ffd700;font-size:12px;margin:6px 0 4px;text-align:center">选择要放置的级别：</div>';
    html += '<div class="tc-tier-grid">';
    for (let i = 0; i < Math.min(6, TIERS.length); i++) {
      html += `<button class="tc-tier-ball" data-tier="${i}" onclick="selectPendingTier(${i})" style="background:radial-gradient(circle at 65% 35%, ${lightenColor(TIERS[i].color, 35)}, ${TIERS[i].color} 70%, ${darkenColor(TIERS[i].color, 15)});border-color:${TIERS[i].color}"><span class="tcb-emoji">${TIERS[i].emoji}</span><span class="tcb-name">${TIERS[i].name}</span></button>`;
    }
    html += '</div>';
    html += '<div class="tc-tier-hint" id="tcTierHint">请选择一个级别</div>';
    extra.innerHTML = html;
    document.getElementById('tcConfirmBtn').disabled = true;
  } else if (toolId === 3) {
    extra.innerHTML = '<div style="color:#aaa;font-size:11px;text-align:center;margin-bottom:4px">随机重置10个球的位置（带保护期）</div>';
    document.getElementById('tcConfirmBtn').disabled = false;
  } else {
    document.getElementById('tcConfirmBtn').disabled = false;
  }

  document.getElementById('toolConfirm').classList.add('show');
  onModalOpen();
}

function selectPendingTier(idx) {
  pendingTier = idx;
  document.querySelectorAll('.tc-tier-ball').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.tier) === idx);
  });
  document.getElementById('tcTierHint').textContent = `已选择：${TIERS[idx].emoji} ${TIERS[idx].name}`;
  document.getElementById('tcTierHint').style.color = '#ffd700';
  document.getElementById('tcConfirmBtn').disabled = false;
}

function confirmTool() {
  if (pendingTool === 2 && pendingTier < 0) return;
  document.getElementById('toolConfirm').classList.remove('show');
  onModalClose();

  // Deduct points (skip in dev mode)
  if (!devMode) {
    if (pendingTool === 2) {
      score -= 10000;
      tool2Uses++; // Tracked for speedrun penalty
    } else {
      score -= 30000;
      toolUses++;
    }
  }
  updateUI();
  activeTool = pendingTool;
  updateToolButtons();

  if (pendingTool === 1) {
    // User clicks canvas to select area
    showToolStatus('长按选择清除区域', 0);
  } else if (pendingTool === 2) {
    // User clicks canvas to choose placement position
    showToolStatus('点击画布选择放置位置', 0);
  } else if (pendingTool === 3) {
    // Execute immediately — grace period prevents game over during falling
    doRandomReset();
    flyTexts.push({ text: '结构性调整', x: -200, y: 80 + Math.random() * 60, speed: 3 + Math.random(), opacity: 1 });
    lastDropTime = Date.now(); // Suppress game over check for 2s
    activeTool = 0;
    updateToolButtons();
    showToolStatus('✅ 已随机重置10个球（保护期内不判定失败）', 2000);
  }
  pendingTool = 0;
}

function doAutoAreaDelete() {
  const cx = W / 2, cy = H * 0.7;
  const toRemove = [];
  for (const ball of balls) {
    if (ball.tier < 0) continue;
    if (ball.tier >= TIERS.length - 1) continue; // Cannot delete highest tier
    const dx = ball.body.position.x - cx;
    const dy = ball.body.position.y - cy;
    if (Math.sqrt(dx*dx + dy*dy) <= DELETE_RADIUS + (ball.body.circleRadius || TIERS[ball.tier].radius)) {
      toRemove.push(ball);
    }
  }
  for (const b of toRemove) {
    Composite.remove(world, b.body);
    b.tier = -1;
  }
  balls = balls.filter(b => b.tier >= 0);
  showToolStatus(`✅ 已清除中央区域 ${toRemove.length} 个球（最高级别不受影响）`, 1000);
  activeTool = 0;
  updateToolButtons();
}

// Area delete at specific coordinates (called from tool 1 releaseDrop)
function doAreaDeleteAt(cx, cy) {
  const toRemove = [];
  for (const ball of balls) {
    if (ball.tier < 0) continue;
    if (ball.tier >= TIERS.length - 1) continue; // Cannot delete highest tier
    const dx = ball.body.position.x - cx;
    const dy = ball.body.position.y - cy;
    if (Math.sqrt(dx*dx + dy*dy) <= DELETE_RADIUS + (ball.body.circleRadius || TIERS[ball.tier].radius)) {
      toRemove.push(ball);
    }
  }
  for (const b of toRemove) {
    Composite.remove(world, b.body);
    b.tier = -1;
  }
  balls = balls.filter(b => b.tier >= 0);
  showToolStatus(`✅ 已清除 ${toRemove.length} 个球`, 1000);
  activeTool = 0;
  updateToolButtons();
  flyTexts.push({ text: '一板砖下去', x: -200, y: 80 + Math.random() * 60, speed: 3 + Math.random(), opacity: 1 });
}

function doAutoPlace(tierIdx) {
  let placed = 0;
  for (let i = 0; i < 1; i++) {
    const x = WALL_L + TIERS[tierIdx].radius + 4 + Math.random() * (WALL_R - WALL_L - TIERS[tierIdx].radius * 2 - 8);
    const y = 40 + Math.random() * 30;
    const ball = createBall(tierIdx, x, y, true);
    Body.setStatic(ball, false);
    placed++;
  }
  lastDropTime = Date.now();
  showToolStatus(`✅ 已放置 ${placed} 个 ${TIERS[tierIdx].emoji}${TIERS[tierIdx].name}（保护期内不判定失败）`, 1000);
  flyTexts.push({ text: '误闯天家', x: -200, y: 80 + Math.random() * 60, speed: 3 + Math.random(), opacity: 1 });
  activeTool = 0;
  updateToolButtons();
}

// Place ball at specific coordinates (called from tool 2 releaseDrop)
function doPlaceBallAt(tierIdx, x, y) {
  const ball = createBall(tierIdx, x, y, true);
  Body.setStatic(ball, false);
  lastDropTime = Date.now();
  showToolStatus(`✅ 已放置 ${TIERS[tierIdx].emoji}${TIERS[tierIdx].name}`, 1000);
  flyTexts.push({ text: '误闯天家', x: -200, y: 80 + Math.random() * 60, speed: 3 + Math.random(), opacity: 1 });
  // Full state cleanup — deactivate tool 2 completely
  activeTool = 0;
  tool2DropActive = false;
  pendingTier = -1;
  updateToolButtons();
}

function doRandomReset() {
  const activeBalls = balls.filter(b => b.tier >= 0);
  if (activeBalls.length === 0) return;
  const count = Math.min(10, activeBalls.length);
  const shuffled = [...activeBalls].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, count);
  for (const b of selected) {
    const x = WALL_L + TIERS[b.tier].radius + 4 + Math.random() * (WALL_R - WALL_L - TIERS[b.tier].radius * 2 - 8);
    const y = 40 + Math.random() * 100;
    Body.setPosition(b.body, { x, y });
    Body.setVelocity(b.body, { x: (Math.random()-0.5)*2, y: 0 });
  }
}

  const name = document.getElementById('congratsNameInput').value.trim() || '匿名';
  playerName = name;
  const entry = {
    name,
    totalScore: score,

    date: new Date().toLocaleDateString()
  };

// ======================== Game Over ========================
function checkGameOver() {
  if (congratsShown || Date.now() - lastDropTime < 2000) return;
  const dangerY = 70;
  for (const ball of balls) {
    if (ball.tier < 0) continue;
    if (ball.body.position.y < dangerY && !ball.body.isStatic) {
      const velocity = ball.body.velocity;
      if (Math.abs(velocity.y) < 0.5 && ball.body.position.y < dangerY) {
        setGameOver();
        return;
      }
    }
  }
}

function setGameOver() {
  if (gameOver) return;
  gameOver = true;
  canDrop = false;
  activeTool = 0;
  cancelTool();
  closeSettings();
  document.getElementById('finalScore').textContent = score;
  const maxTier = balls.reduce((max, b) => b.tier > max ? b.tier : max, -1);
  document.getElementById('mergedCount').textContent = `最高官职：${maxTier >= 0 ? TIERS[maxTier].emoji + ' ' + TIERS[maxTier].name : '无'}`;
  document.getElementById('nameInput').value = playerName;
  // Calculate rank in total score ranking
  const rankEl = document.getElementById('gameOverRank');
  const allScores = rankings.map(r => r.totalScore).concat(score);
  allScores.sort((a, b) => b - a);
  const rankPos = allScores.indexOf(score) + 1;
  rankEl.textContent = '运营总分：' + score + ' · 当前排名：#' + rankPos;
  rankEl.style.display = 'block';
  setTimeout(() => {
    document.getElementById('gameOverOverlay').classList.add('show');
    onModalOpen();
    document.getElementById('nameInput').focus();
  }, 500);
}

function settleGame() {
  if (gameOver) return;
  // Close congrats modal if open
  if (congratsShown) closeCongrats();
  document.getElementById('settleBtn').classList.remove('show');
  setGameOver();
}

function goBackToGame() {
  document.getElementById('gameOverOverlay').classList.remove('show');
  onModalClose();
  gameOver = false;
  canDrop = true;
  currentDrop = null;
  lastDropTime = Date.now();
  document.getElementById('settleBtn').classList.add('show');
  const maxTier = Math.min(4 + Math.floor(score / 200), 8);
  nextTier = Math.floor(Math.random() * maxTier);
  if (nextTier >= TIERS.length) nextTier = TIERS.length - 4;
  updateUI();
}

}

// ======================== Star Drawing ========================
function drawStar(x, y, outerR, innerR, points, rotation, color, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity || 1;
  ctx.fillStyle = color || '#ffd700';
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : (innerR || outerR * 0.4);
    const angle = (i * Math.PI / points) - Math.PI / 2 + rotation;
    const px = x + Math.cos(angle) * r;
    const py = y + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  if (outerR > 10) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20; ctx.fill(); ctx.shadowBlur = 0; }
  ctx.restore();
}

function updateStars() {
  for (const star of stars) {
    star.rotation += star.speed;
    star.opacity = 0.4 + 0.5 * (0.5 + 0.5 * Math.sin(Date.now() * star.speed * 0.5 + star.x));
  }
}

function drawStars() {
  for (const star of stars) {
    const color = STAR_COLORS[Math.floor(star.x * star.y) % STAR_COLORS.length];
    drawStar(star.x, star.y, star.outerR, star.outerR * 0.4, 5, star.rotation, color, star.opacity);
  }
}

// ======================== Drawing ========================
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#8b0000'); grad.addColorStop(0.3, '#cc0000'); grad.addColorStop(0.7, '#b22222'); grad.addColorStop(1, '#6b0000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 200);
  glow.addColorStop(0, 'rgba(255,215,0,0.03)'); glow.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);
  drawStars();
  // Danger zone line (game over threshold)
  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = 'rgba(255,215,0,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(WALL_L + 2, 70);
  ctx.lineTo(WALL_R - 2, 70);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,215,0,0.08)'; ctx.fillRect(WALL_L + 2, 0, WALL_R - WALL_L - 4, 70);
  ctx.fillStyle = 'rgba(255,215,0,.1)'; ctx.fillRect(WALL_L, GROUND_Y - 4, WALL_R - WALL_L, 14);
  ctx.fillStyle = 'rgba(255,215,0,.05)'; ctx.fillRect(0, 0, WALL_L, H); ctx.fillRect(WALL_R, 0, W - WALL_R, H);
}

function drawBall(body, tierIndex) {
  const tier = TIERS[tierIndex];
  if (!tier) return;
  const { x, y } = body.position;
  const radius = body.circleRadius || tier.radius;
  if (tierIndex >= TIERS.length - 2) { ctx.beginPath(); ctx.arc(x, y, radius + 6, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,215,0,0.15)'; ctx.fill(); }
  ctx.beginPath(); ctx.arc(x + 2, y + 2, radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fill();
  const grad = ctx.createRadialGradient(x - radius*0.2, y - radius*0.2, radius*0.1, x, y, radius);
  grad.addColorStop(0, lightenColor(tier.color, 25)); grad.addColorStop(0.6, tier.color); grad.addColorStop(1, darkenColor(tier.color, 12));
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.arc(x - radius*0.2, y - radius*0.2, radius*0.25, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,.15)'; ctx.fill();
  ctx.lineWidth = tierIndex >= TIERS.length - 2 ? 2.5 : 1.5; ctx.strokeStyle = tierIndex >= TIERS.length - 2 ? '#ffd700' : 'rgba(255,255,255,.2)'; ctx.stroke();
  ctx.font = `${Math.max(12, radius * 0.7)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(tier.emoji, x, y - radius * 0.12);
  const fontSize = Math.max(10, Math.min(14, radius * 0.4));
  ctx.font = `bold ${fontSize}px "Microsoft YaHei","PingFang SC",sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  ctx.strokeText(tier.name, x, y + radius * 0.28); ctx.fillStyle = '#fff'; ctx.fillText(tier.name, x, y + radius * 0.28);
}

function drawGuideLine() {
  if (!canDrop || gameOver || activeTool) return;
  ctx.setLineDash([4, 6]); ctx.strokeStyle = 'rgba(255,215,0,.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(dropX, 45); ctx.lineTo(dropX, GROUND_Y); ctx.stroke(); ctx.setLineDash([]);
}

function drawDropPreview() {
  if (!currentDrop) return;
  ctx.beginPath(); ctx.arc(currentDrop.position.x, currentDrop.position.y, TIERS[nextTier].radius + 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,215,0,.1)'; ctx.fill();
}

// ======================== Color helpers ========================
function lightenColor(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  return `rgb(${Math.min(255,(num>>16)+pct)},${Math.min(255,((num>>8)&0xFF)+pct)},${Math.min(255,(num&0xFF)+pct)})`;
}
function darkenColor(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  return `rgb(${Math.max(0,(num>>16)-pct)},${Math.max(0,((num>>8)&0xFF)-pct)},${Math.max(0,(num&0xFF)-pct)})`;
}

const bgmAudio = document.getElementById('bgmAudio');
let musicPlaying = false;
let musicCtx = null;
bgmAudio.volume = 0.3;

function toggleMusic() {
  if (musicPlaying) {
    bgmAudio.pause();
    musicPlaying = false;
  } else {
    musicPlaying = true;
    bgmAudio.play().catch(() => { musicPlaying = false; });

function playMergeSound(tier) {
  try {
    if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (musicCtx.state === 'suspended') musicCtx.resume();
    const now = musicCtx.currentTime;
    // Base frequency rises with tier — more satisfying for higher merges
    const baseFreq = 220 + tier * 55;
    const vol = 0.12 + tier * 0.025;

    // Tone 1: main chime — ascending glide
    const osc1 = musicCtx.createOscillator();
    const gain1 = musicCtx.createGain();
    osc1.type = tier >= 6 ? 'triangle' : 'sine';
    osc1.frequency.setValueAtTime(baseFreq, now);
    osc1.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.12);
    gain1.gain.setValueAtTime(vol, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc1.connect(gain1); gain1.connect(musicCtx.destination);
    osc1.start(now); osc1.stop(now + 0.25);

    // Tone 2: harmony — a perfect fifth above, delayed slightly
    if (tier >= 2) {
      const osc2 = musicCtx.createOscillator();
      const gain2 = musicCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(baseFreq * 1.5, now + 0.04);
      osc2.frequency.exponentialRampToValueAtTime(baseFreq * 2.0, now + 0.16);
      gain2.gain.setValueAtTime(vol * 0.5, now + 0.04);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc2.connect(gain2); gain2.connect(musicCtx.destination);
      osc2.start(now + 0.04); osc2.stop(now + 0.3);
    }

    // Impact noise — short burst for punch
    const bufSize = musicCtx.sampleRate * 0.04;
    const buf = musicCtx.createBuffer(1, bufSize, musicCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 4);
    const src = musicCtx.createBufferSource(); src.buffer = buf;
    const g3 = musicCtx.createGain();
    g3.gain.setValueAtTime(vol * 0.4, now);
    g3.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    src.connect(g3); g3.connect(musicCtx.destination);
    src.start(now);
  } catch(e) { /* ignore */ }
}

function triggerShake(power) { shakeFrames = 8; shakePower = Math.min(power, 8); }

// ======================== Game Loop ========================
function gameLoop() {
  if (gameOver) { draw(); return; }
  Engine.update(engine, 1000/60);
  updateStars();
  updateParticles();
  updateScorePopups();
  updateFlyTexts();
  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - 0.02);
  checkGameOver();
  draw();
  requestAnimationFrame(gameLoop);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shakeFrames > 0) {
    const decay = shakeFrames / 8;
    ctx.translate((Math.random()-0.5)*shakePower*decay, (Math.random()-0.5)*shakePower*decay);
    shakeFrames--;
  }
  drawBackground();
  drawGuideLine();
  ctx.fillStyle = 'rgba(255,215,0,.06)'; ctx.fillRect(0, 0, WALL_L, H); ctx.fillRect(WALL_R, 0, W - WALL_R, H);
  for (const ball of balls) { if (ball.tier >= 0) drawBall(ball.body, ball.tier); }
  drawParticles();
  drawScorePopups();
  drawFlyTexts();
  drawDropPreview();
  // Tool 1 area preview
  if (activeTool === 1 && toolSelectActive) {
    ctx.beginPath();
    ctx.arc(toolSelectX, toolSelectY, DELETE_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,0,0,0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,0,0,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  // Tool 2 ball preview
  if (activeTool === 2 && tool2DropActive && pendingTier >= 0) {
    ctx.save();
    ctx.globalAlpha = 0.6;
    const pt = TIERS[pendingTier];
    drawBall({ position: { x: tool2DropX, y: tool2DropY }, circleRadius: pt.radius }, pendingTier);
    ctx.restore();
    ctx.beginPath();
    ctx.arc(tool2DropX, tool2DropY, pt.radius + 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fill();
  }
  if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,215,0,${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
  ctx.restore();
}

// ======================== Input ========================
let isDragging = false;

canvas.addEventListener('mousedown', (e) => {
  startDrop(e.clientX, e.clientY);
  isDragging = true;
});
canvas.addEventListener('mousemove', (e) => {
  if (isDragging) moveDrop(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup', () => {
  if (isDragging) { releaseDrop(); isDragging = false; }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  startDrop(touch.clientX, touch.clientY);
  isDragging = true;
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isDragging) {
    const touch = e.touches[0];
    moveDrop(touch.clientX, touch.clientY);
  }
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (isDragging) { releaseDrop(); isDragging = false; }
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (gameOver) {
    if (e.key === 'Enter') submitAndShowRanking();
    return;
  }
  if (e.key === 'ArrowLeft') {
    if (canDrop && !gameOver && !activeTool) {
      dropX = Math.max(WALL_L + TIERS[nextTier].radius + 4, dropX - 15);
      if (currentDrop) Body.setPosition(currentDrop, { x: dropX, y: 40 });
    }
  }
  if (e.key === 'ArrowRight') {
    if (canDrop && !gameOver && !activeTool) {
      dropX = Math.min(WALL_R - TIERS[nextTier].radius - 4, dropX + 15);
      if (currentDrop) Body.setPosition(currentDrop, { x: dropX, y: 40 });
    }
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (canDrop && !gameOver && currentDrop && !activeTool) releaseDrop();
  }
  if (e.key === 'Escape') cancelTool();
});

// ======================== Tool bar events ========================
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => useTool(parseInt(btn.dataset.tool)));
});

// ======================== Ranking events ========================
document.querySelectorAll('.rank-tab').forEach(tab => {
  tab.addEventListener('click', () => renderRanking(tab.dataset.rank));
});
document.getElementById('rankClose').addEventListener('click', () => {
  document.getElementById('rankModal').classList.remove('show');
  onModalClose();
  if (gameOver) document.getElementById('gameOverOverlay').classList.add('show');
});
document.getElementById('rankModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('rankModal')) {
    document.getElementById('rankModal').classList.remove('show');
    onModalClose();
    if (gameOver) document.getElementById('gameOverOverlay').classList.add('show');
  }
});

// ======================== Settings & Dev Mode ========================
function openSettings() {
  document.getElementById('settingsModal').classList.add('show');
  onModalOpen();
  updateSettingsUI();
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
  onModalClose();
  // Reset password UI
  document.getElementById('devPasswordArea').style.display = 'none';
  document.getElementById('devPasswordInput').value = '';
  document.getElementById('devPasswordError').style.display = 'none';
}

function updateSettingsUI() {
  const musicBtn = document.getElementById('settingsMusicBtn');
  musicBtn.textContent = musicPlaying ? '已开启' : '已关闭';
  musicBtn.classList.toggle('active', musicPlaying);

  const devBtn = document.getElementById('settingsDevBtn');
  devBtn.textContent = devMode ? '已开启' : '已关闭';
  devBtn.classList.toggle('active', devMode);
}

function toggleSettingsMusic() {
  toggleMusic();
  updateSettingsUI();
}

function toggleDevModeBtn() {
  if (devMode) {
    // Turn off dev mode
    devMode = false;
    document.getElementById('devPasswordArea').style.display = 'none';
    document.getElementById('devPasswordInput').value = '';
    document.getElementById('devPasswordError').style.display = 'none';
    updateSettingsUI();
  } else {
    // Show password prompt
    document.getElementById('devPasswordArea').style.display = 'flex';
    document.getElementById('devPasswordInput').focus();
  }
}

function clearRankings() {
  if (!confirm('确定删除所有排名数据？此操作不可恢复！')) return;
  rankings = [];
  sessionRankIdx = -1;
  highlightRankId = -1;
  try { localStorage.removeItem('govRankings'); } catch(e) {}
  showToolStatus('🗑️ 所有排名数据已删除', 2000);
  // Close ranking modal if open
  document.getElementById('rankModal').classList.remove('show');
}

function submitDevPassword() {
  const pwd = document.getElementById('devPasswordInput').value;
  if (pwd === '666') {
    devMode = true;
    document.getElementById('devPasswordArea').style.display = 'none';
    document.getElementById('devPasswordInput').value = '';
    document.getElementById('devPasswordError').style.display = 'none';
    showToolStatus('🔧 开发者模式已激活！', 2000);
    updateSettingsUI();
  } else {
    document.getElementById('devPasswordError').style.display = 'block';
    document.getElementById('devPasswordInput').value = '';
    document.getElementById('devPasswordInput').focus();
  }
}

// Settings modal events
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('settingsModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
});
document.getElementById('settingsMusicBtn').addEventListener('click', toggleSettingsMusic);
document.getElementById('settingsDevBtn').addEventListener('click', toggleDevModeBtn);
document.getElementById('devPasswordSubmit').addEventListener('click', submitDevPassword);
document.getElementById('devPasswordCancel').addEventListener('click', () => {
  document.getElementById('devPasswordArea').style.display = 'none';
  document.getElementById('devPasswordInput').value = '';
  document.getElementById('devPasswordError').style.display = 'none';
});
document.getElementById('devPasswordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitDevPassword();
});

// ======================== Restart ========================
function restartGame() {
  initGame();
  gameLoop();
}

// ======================== 微信分享 QR Code ========================
const qrcodeBox = document.getElementById('qrcodeBox');
const qrcodeImg = document.getElementById('qrcodeImg');
const qrcodeUrl = document.getElementById('qrcodeUrl');
const qrcodeClose = document.getElementById('qrcodeClose');
const pageUrl = window.location.href.split('?')[0].split('#')[0];
qrcodeUrl.textContent = pageUrl;
qrcodeImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pageUrl)}`;
qrcodeClose.addEventListener('click', () => qrcodeBox.classList.remove('show'));
qrcodeBox.addEventListener('click', (e) => { if (e.target === qrcodeBox) qrcodeBox.classList.remove('show'); });

// ======================== Start ========================
initGame();
gameLoop();
</script>
